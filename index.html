<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>悠屿小窝</title>
    <style>
        /* 全局样式重置，避免浏览器差异 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 页面背景（橙色浅色） */
        body {
            font-family: Arial, sans-serif;
            background-color: #fff3e0;
            color: #333;
            text-align: center;
            padding: 20px;
        }

        /* 容器颜色改为橙色浅色 */
        .container {
            width: 100%;
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
            background-color: #fff3e0;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        /* 暖色方框（主色：橙色#ff9500） */
        .welcome-box {
            background-color: #f7cdc0;
            color: white;
            padding: 30px;
            border-radius: 10px;
            margin: 20px 0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .choice-box {
            background-color: #f7cdc0;
            color: white;
            padding: 30px;
            border-radius: 10px;
            margin: 20px 0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: none;
        }

        .rest-box {
            background-color: #f7cdc0;
            color: white;
            padding: 30px;
            border-radius: 10px;
            margin: 20px 0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: none;
        }

        .final-box {
            background-color: #f7cdc0;
            color: white;
            padding: 30px;
            border-radius: 10px;
            margin: 20px 0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            align-items: center;
            justify-content: center;
            display: none;
        }

        /* 第五个方框（初始隐藏） */
        .fifth-box {
            background-color: #f7cdc0;
            color: white;
            padding: 30px;
            border-radius: 10px;
            margin: 20px 0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: none;
        }

        /* 方框内标题样式 */
        .welcome-box h2, .choice-box h2, .rest-box h2, .final-box h2, .fifth-box h2 {
            font-size: 24px;
            margin-bottom: 15px;
        }

        /* 方框内段落样式 */
        .welcome-box p, .choice-box p, .rest-box p, .final-box p, .fifth-box p {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        /* 方框内图片样式 */
        .welcome-box img, .final-box img {
            width: 150px;
            height: 150px;
            margin-right: 30px;
            border-radius: 8px;
        }

        /* 按钮样式 */
        .confirm-btn, .choice-btn, .rest-btn, .date-btn {
            background-color: white;
            color: #f7cdc0;
            border: 2px solid #f7d3c8;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
            margin: 0 10px;
        }

        .confirm-btn:hover, .choice-btn:hover, .rest-btn:hover, .date-btn:hover {
            background-color: #fff3e0;
            color: white;
        }

        /* 响应式调整（手机端优化） */
        @media only screen and (max-width: 600px) {
            .container {
                margin: 20px auto;
                padding: 15px;
            }
            .welcome-box, .choice-box, .rest-box, .final-box, .fifth-box {
                padding: 20px;
            }
            .welcome-box h2, .choice-box h2, .rest-box h2, .final-box h2, .fifth-box h2 {
                font-size: 20px;
            }
            .welcome-box p, .choice-box p, .rest-box p, .final-box p, .fifth-box p {
                font-size: 14px;
            }
            .confirm-btn, .choice-btn, .rest-btn, .date-btn {
                padding: 8px 16px;
                font-size: 14px;
            }
            .welcome-box img, .final-box img {
                width: 150px;
                height: auto;
                margin-right: 30px;
                border-radius: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 第一个方框（初始显示） -->
        <div class="welcome-box" id="welcomeBox">
            <img src="photo\p4.jpg">
            <div class="text-content">
                <h2>亲爱的屿</h2>
                <p>欢迎来到这里</p>
                <p>准备好了嘛</p>
                <button class="confirm-btn" id="confirmBtn">确认</button>
            </div>
        </div>

        <!-- 第二个方框（初始隐藏） -->
        <div class="choice-box" id="choiceBox">
            <h2>2022年5月31日</h2>
            <p>今天晚上你因为排位心情不好，这时你选择？</p>
            <button class="choice-btn" id="quitBtn">退出第五人格</button>
            <button class="choice-btn" id="goHomeBtn">去逛逛归宿</button>
        </div>

        <!-- 第三个方框（初始隐藏） -->
        <div class="rest-box" id="restBox">
            <h2>似乎是个不错的休息地...</h2>
            <p>在这个秋千上看他们在聊什么吧</p>
            <button class="rest-btn" id="afterBtn">过了一会后...</button>
        </div>

        <!-- 第四个方框（初始隐藏） -->
        <div class="final-box" id="finalBox">
            <div class="text-content">
                <h2>有人悄悄坐上了你的秋千...</h2>
                <p>...</p>
                <p>似乎要有什么有趣的事情发生了~</p>
                <button class="rest-btn" id="toFifthBtn">2025年6月1日</button>
            </div>
        </div>

        <!-- 第五个方框（初始隐藏） -->
        <div class="fifth-box" id="fifthBox">
            <h2>正式认识的第一天...有点懵</h2>
            <p>事后我们聊过很多次，聊是怎么相遇的，聊是怎么开始的</p>
            <button class="date-btn" id="dateBtn2026">2026年6月7日</button>
        </div>
    </div>

    <!-- JavaScript：处理页面切换 -->
    <script>
        // 获取元素
        const confirmBtn = document.getElementById('confirmBtn');
        const welcomeBox = document.getElementById('welcomeBox');
        const choiceBox = document.getElementById('choiceBox');
        const restBox = document.getElementById('restBox');
        const finalBox = document.getElementById('finalBox');
        const fifthBox = document.getElementById('fifthBox');
        const quitBtn = document.getElementById('quitBtn');
        const goHomeBtn = document.getElementById('goHomeBtn');
        const afterBtn = document.getElementById('afterBtn');
        const toFifthBtn = document.getElementById('toFifthBtn');
        const dateBtn2026 = document.getElementById('dateBtn2026');

        // 第一个方框的确认按钮点击事件
        confirmBtn.addEventListener('click', function() {
            welcomeBox.style.display = 'none';
            choiceBox.style.display = 'block';
        });

        // 第二个方框的"退出第五人格"按钮点击事件
        quitBtn.addEventListener('click', function() {
            choiceBox.innerHTML = '';
            
            const newContent = document.createElement('div');
            newContent.innerHTML = `
                <p>呀咩咯</p>
                <p>某人是第五人格忠实的兵</p>
                <button class="choice-btn" id="dynamicGoHomeBtn">去逛逛归宿</button>
            `;
            choiceBox.appendChild(newContent);
            
            document.getElementById('dynamicGoHomeBtn').addEventListener('click', function() {
                choiceBox.style.display = 'none';
                restBox.style.display = 'block';
            });
        });

        // 第二个方框的"去逛逛归宿"按钮点击事件
        goHomeBtn.addEventListener('click', function() {
            choiceBox.style.display = 'none';
            restBox.style.display = 'block';
        });

        // 第三个方框的"过了一会..."按钮点击事件
        afterBtn.addEventListener('click', function() {
            restBox.style.display = 'none';
            finalBox.style.display = 'flex';
        });

        // 第四个方框的"2025年6月1日"按钮点击事件 → 显示第五个方框
        toFifthBtn.addEventListener('click', function() {
            finalBox.style.display = 'none';
            fifthBox.style.display = 'block';
        });

        // 第五个方框的"2026年6月7日"按钮点击事件（预留后续扩展）
        dateBtn2026.addEventListener('click', function() {
            // 后续可以继续添加下一个方框
        });
    </script>
</body>
</html>
